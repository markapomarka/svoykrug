<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Челленджи - СвойКруг</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/challenges.css">
</head>
<body>
    <div class="app-container">
        <!-- Шапка -->
        <header class="main-header">
            <div class="back-button" onclick="history.back()">
                <i class="material-symbols-outlined">arrow_back</i>
            </div>
            <h1 class="gradient-title">Челленджи</h1>
            <div class="filter-icon" onclick="openFilterModal()">
                <i class="material-symbols-outlined">filter_alt</i>
            </div>
        </header>

        <!-- Модальное окно фильтров -->
        <div class="filter-modal" id="filterModal">
            <div class="filter-modal-content">
                <div class="filter-header">
                    <h3>Фильтры</h3>
                    <span class="clear-filters" onclick="clearAllFilters()">Очистить фильтры</span>
                </div>
                
                <div class="filter-options">
                    <div class="filter-group">
                        <div class="filter-checkbox" onclick="toggleFilter('new')">
                            <div class="checkbox" id="filterNew"></div>
                            <span>Новые</span>
                        </div>
                        <div class="filter-checkbox" onclick="toggleFilter('completed')">
                            <div class="checkbox" id="filterCompleted"></div>
                            <span>Завершенные</span>
                        </div>
                    </div>
                    
                    <div class="filter-group">
                        <div class="filter-dropdown" onclick="toggleDropdown('duration')">
                            <span>Длительность</span>
                            <i class="material-symbols-outlined">expand_more</i>
                        </div>
                        <div class="dropdown-menu" id="durationDropdown">
                            <div class="dropdown-item" onclick="selectDuration('all')">Все</div>
                            <div class="dropdown-item" onclick="selectDuration('2 дня')">2 дня</div>
                            <div class="dropdown-item" onclick="selectDuration('14 дней')">14 дней</div>
                            <div class="dropdown-item" onclick="selectDuration('2 месяца')">2 месяца</div>
                            <div class="dropdown-item" onclick="selectDuration('5 месяцев')">5 месяцев</div>
                        </div>
                    </div>
                    
                    <div class="filter-group">
                        <div class="filter-dropdown" onclick="toggleDropdown('theme')">
                            <span>Тематика</span>
                            <i class="material-symbols-outlined">expand_more</i>
                        </div>
                        <div class="dropdown-menu" id="themeDropdown">
                            <div class="dropdown-item" onclick="selectTheme('all')">Все</div>
                            <div class="dropdown-item" onclick="selectTheme('романтика')">Романтика</div>
                            <div class="dropdown-item" onclick="selectTheme('путешествия')">Путешествия</div>
                            <div class="dropdown-item" onclick="selectTheme('гастрономия')">Гастрономия</div>
                            <div class="dropdown-item" onclick="selectTheme('искусство')">Искусство</div>
                            <div class="dropdown-item" onclick="selectTheme('музыка')">Музыка</div>
                        </div>
                    </div>
                </div>
                
                <button class="apply-filters-btn" onclick="applyFilters()">Применить</button>
            </div>
        </div>

        <!-- Контент -->
        <main class="content-scroll">
            <!-- Вкладки -->
            <div class="challenges-tabs">
                <button class="tab-btn active" onclick="switchTab('all')">Все челленджи</button>
                <button class="tab-btn" onclick="switchTab('my')">Мои челленджи</button>
            </div>

            <!-- Список всех челленджей -->
            <div id="allChallenges" class="challenges-list"></div>

            <!-- Список моих челленджей -->
            <div id="myChallenges" class="challenges-list" style="display: none;"></div>
        </main>

        <!-- Нижняя навигация -->
        <footer class="bottom-nav-icons">
            <div class="nav-icon-item" onclick="toggleSideMenu()">
                <i class="material-symbols-outlined">menu</i>
            </div>
            <div class="nav-icon-item" onclick="window.location.href='../index.html'">
                <i class="material-symbols-outlined">home</i>
            </div>
            <div class="nav-icon-item" onclick="alert('🎫 Раздел билетов в разработке')">
                <i class="material-symbols-outlined">confirmation_number</i>
            </div>
            <div class="nav-icon-item" onclick="alert('❤️ Избранное в разработке')">
                <i class="material-symbols-outlined">favorite</i>
            </div>
            <div class="nav-icon-item"  onclick="window.location.href='profile.html'">
                <i class="material-symbols-outlined">person</i>
            </div>
        </footer>
    </div>

    <script src="../scripts/challenges.js"></script>
    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const tab = urlParams.get('tab');
            if (tab === 'my') {
                setTimeout(() => {
                    if (typeof switchTab === 'function') {
                        switchTab('my');
                    }
                }, 200);
            }
        })();
    </script>
</body>
</html>
