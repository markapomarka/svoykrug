<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Колесо удачи - СвойКруг</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/wheel.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="back-button" onclick="history.back()">
                <i class="material-symbols-outlined">arrow_back</i>
            </div>
            <h1 class="gradient-title">Колесо удачи</h1>
            <div class="header-placeholder"></div>
        </header>

        <main class="content-scroll">
            <div class="balance-card">
                <div class="balance-label">Ваш баланс</div>
                <div class="balance-value">
                    <span class="balance-amount" id="balanceAmount">600</span>
                    <span class="crystal-orange-small"></span>
                </div>
                <button class="topup-btn" onclick="showTopupModal()">Пополнить</button>
            </div>

            <div class="wheel-container">
                <div class="wheel-wrapper">
                    <canvas id="wheelCanvas" width="400" height="400"></canvas>
                    <div class="wheel-pointer"></div>
                    <div class="wheel-center"></div>
                </div>
            </div>

            <div class="spin-section">
                <button class="spin-btn" id="spinBtn" onclick="spinWheel()">Крутить колесо</button>
                <div class="spin-cost">Стоимость: 300 <span class="crystal-orange"></span></div>
            </div>

        </main>

        <div class="result-modal" id="resultModal">
            <div class="result-modal-content">
                <div class="result-modal-close" onclick="closeResultModal()">✕</div>
                <div class="result-icon" id="resultIcon">🎉</div>
                <h3 id="resultTitle">Поздравляем!</h3>
                <p id="resultMessage">Вы выиграли 500 ◆</p>
                <button class="result-btn" onclick="closeResultModal()">Отлично!</button>
            </div>
        </div>

        <div class="topup-modal" id="topupModal">
            <div class="topup-modal-content">
                <div class="topup-modal-close" onclick="closeTopupModal()">✕</div>
                <h3>Пополнить баланс</h3>
                <div class="topup-options">
                    <div class="topup-option" onclick="selectTopup(100)">
                        <span class="topup-amount">100</span>
                        <span class="topup-price crystal-orange"></span>
                    </div>
                    <div class="topup-option" onclick="selectTopup(300)">
                        <span class="topup-amount">300</span>
                        <span class="topup-price crystal-orange"></span>
                    </div>
                    <div class="topup-option" onclick="selectTopup(500)">
                        <span class="topup-amount">500</span>
                        <span class="topup-price crystal-orange"></span>
                    </div>
                    <div class="topup-option" onclick="selectTopup(1000)">
                        <span class="topup-amount">1000</span>
                        <span class="topup-price crystal-orange"></span>
                    </div>
                </div>
                <button class="topup-confirm-btn" onclick="confirmTopup()">Пополнить</button>
            </div>
        </div>

        <div class="reward-modal" id="rewardModal">
            <div class="reward-modal-content">
                <div class="reward-modal-close" onclick="closeRewardModal()">✕</div>
                <div class="reward-modal-icon">
                    <i class="material-symbols-outlined">emoji_events</i>
                </div>
                <h3>Награды успешно добавлены в Профиль!</h3>
                <button class="reward-modal-btn" onclick="goToProfile()">Посмотреть профиль</button>
            </div>
        </div>

        <footer class="bottom-nav-icons">
            <div class="nav-icon-item" onclick="toggleSideMenu()">
                <i class="material-symbols-outlined">menu</i>
            </div>
            <div class="nav-icon-item" onclick="window.location.href='../index.html'">
                <i class="material-symbols-outlined">home</i>
            </div>
            <div class="nav-icon-item" onclick="alert('🎫 Раздел билетов в разработке')">
                <i class="material-symbols-outlined">confirmation_number</i>
            </div>
            <div class="nav-icon-item" onclick="alert('❤️ Избранное в разработке')">
                <i class="material-symbols-outlined">favorite</i>
            </div>
            <div class="nav-icon-item" onclick="window.location.href='profile.html'">
                <i class="material-symbols-outlined">person</i>
            </div>
        </footer>
    </div>

    <script src="../scripts/wheel.js"></script>
</body>
</html>
