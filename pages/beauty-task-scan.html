<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Сканирование QR-кода - СвойКруг</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Sofia+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/task-scan.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="back-button" onclick="history.back()">
                <i class="material-symbols-outlined">arrow_back</i>
            </div>
            <h1 class="gradient-title" id="taskName">Задание</h1>
            <div class="header-placeholder"></div>
        </header>

        <main class="content-scroll">
            <div class="restaurant-info" id="taskInfo"></div>

            <div class="scanner-section">
                <h3>Сканер QR-кода</h3>
                <p>Наведите камеру на QR-код в локации, чтобы отметить выполнение задания</p>
                
                <div class="scanner-preview" id="scannerPreview">
                    <div class="scanner-placeholder">
                        <i class="material-symbols-outlined">qr_code_scanner</i>
                        <span>Камера готова к сканированию</span>
                    </div>
                    <div class="scanner-frame"></div>
                </div>

                <div class="scanner-actions">
                    <button class="scan-btn" onclick="startScanning()">
                        <i class="material-symbols-outlined">qr_code_scanner</i>
                        Начать сканирование
                    </button>
                    <div class="upload-divider">Или</div>
                    <button class="upload-btn" onclick="uploadPhoto()">
                        <i class="material-symbols-outlined">photo_camera</i>
                        Загрузить фото
                    </button>
                </div>
            </div>
        </main>

        <div class="success-modal" id="successModal">
            <div class="success-modal-content">
                <div class="success-icon">
                    <i class="material-symbols-outlined">check_circle</i>
                </div>
                <h3>QR-код успешно отсканирован!</h3>
                <button class="ok-btn" onclick="closeSuccessModal()">OK</button>
            </div>
        </div>

        <div class="loading-modal" id="loadingModal">
            <div class="loading-modal-content">
                <div class="spinner"></div>
                <p>Сканирование...</p>
            </div>
        </div>
    </div>

    <script>
        const taskId = parseInt(new URLSearchParams(window.location.search).get('id')) || 1;

        const tasksInfo = {
            1: { name: 'Арт-встреча', location: 'Вход в Брусницын Лофт', description: 'Посетите выставку уличных художников на входе в Брусницын Лофт и отсканируйте QR-код на одной из картин' },
            2: { name: 'Кофе-брейк', location: 'Кафе Art House', description: 'Закажите фирменный напиток, получите уникальный код на стакане и отсканируйте его' },
            3: { name: 'Мастера рукоделия', location: 'Ярмарка "Handmade"', description: 'Посетите местную ярмарку, купите оригинальную вещь местного мастера и отсканируйте QR-код на чеке' },
            4: { name: 'Творческая студия', location: 'Мастерская "Восход"', description: 'Примите участие в создании собственной керамической миниатюры и получите специальный QR-код' },
            5: { name: 'Фото-флешмоб', location: 'Фотозона "Зеркала"', description: 'Сфотографируйтесь в зеркальном лабиринте и просканируйте финальный QR-код в рамке зеркала' }
        };

        function loadTaskInfo() {
            const task = tasksInfo[taskId];
            if (task) {
                document.getElementById('taskName').textContent = task.name;
                document.getElementById('taskInfo').innerHTML = `
                    <div class="restaurant-address">
                        <i class="material-symbols-outlined">location_on</i>
                        <span>${task.location}</span>
                    </div>
                    <div class="restaurant-description">${task.description}</div>
                `;
            }
        }

        function startScanning() {
            const loadingModal = document.getElementById('loadingModal');
            loadingModal.classList.add('show');
            setTimeout(() => {
                loadingModal.classList.remove('show');
                document.getElementById('successModal').classList.add('show');
            }, 2000);
        }

        function uploadPhoto() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = () => {
                const loadingModal = document.getElementById('loadingModal');
                loadingModal.classList.add('show');
                setTimeout(() => {
                    loadingModal.classList.remove('show');
                    document.getElementById('successModal').classList.add('show');
                }, 1500);
            };
            input.click();
        }

        function closeSuccessModal() {
            document.getElementById('successModal').classList.remove('show');
            localStorage.setItem(`beauty_task_${taskId}_completed`, 'true');
            window.location.href = 'beauty-seekers-active.html';
        }

        document.addEventListener('DOMContentLoaded', loadTaskInfo);
    </script>
</body>
</html>
